    Experience:
      - company: Carolina Population Center, UNC-Chapel Hill
        position: "Research Assistant (Supervisor: Prof. Manuel Schechtl)"
        location: Chapel Hill, NC
        start_date: 2025
        end_date: present
        summary: "Wealth Poverty: Measurement, Prevalence, Determinants; Financial Assets and Health Outcome in Early Adulthood Using Add Health."
        highlights:
          - Conducted literature review on asset poverty, wealth insufficiency, and their determinants for an invited Annual Review of Sociology article.
          - Constructed cardiometabolic risk indices and mediating variable indices including stressful life events, health behaviors, and neighborhood disadvantage using Stata and R.
          - Employed Poisson regression and generalized structural equation modeling (GSEM) to explore potential mediation pathways linking financial assets to cardiometabolic outcomes.

      - company: The Harvard Academy for International and Area Studies, Harvard University
        position: "Research Assistant (Supervisor: Dr. Fumiya Uchikoshi)"
        location: Cambridge, MA
        start_date: 2024
        end_date: 2025
        summary: Gender Disparities in Grade Retention Among Asian Americans.
        highlights:
          - Processed ACS microdata (2008-2023), implementing sibling fixed effects models to examine three-way interactions between gender, race/ethnicity, and family structure.
          - Applied linear probability models with household-clustered standard errors to analyze grade retention patterns across Asian ethnic subgroups.

      - company: Center for Right-Wing Studies, UC Berkeley
        position: "Independent Studies (Supervisor: Prof. Cihan Tugal)"
        location: Berkeley, CA
        start_date: 2024
        end_date: 2024
        summary: Ideological Coherence and Political Identity of Chinese Immigrants.
        highlights:
          - Conducted discourse analysis of comments on WeChat forums to examine ideological alignments around anti-communism, meritocracy, and Christian nationalism.
          - Coded deidentified interview transcripts and ethnography notes from Chinese Christian churches conducted by team members.

      - company: Center for Population and Development Studies, Renmin University of China
        position: "Research Assistant (Supervisor: Prof. Long Li)"
        location: Beijing, China
        start_date: 2023
        end_date: present
        summary: Sleep Patterns and Mental Health Among Adolescents in China; Internet Usage and Mental Health Among Older Adults in China.
        highlights:
          - Coded CEPS data (2013-2020) across five waves using Stata and R, examining bidirectional relationships between sleep patterns and depression symptoms among Chinese adolescents.
          - Applied latent change score models (LCSM) to investigate how educational trajectories moderate the sleep-depression relationship over adolescent development.
          - Applied confirmatory latent class analysis to distinguish pressured Internet use from voluntary Internet use patterns among older adults.
          - Employed structural equation modelling (SEM) to examine differential associations between Internet use types and mental health.

      - company: School of International Studies, Renmin University of China
        position: "Independent Studies (Supervisor: Prof. Shi Li)"
        location: Beijing, China
        start_date: 2022
        end_date: 2023
        summary: The Ban of After-School Tutoring and Educational Inequality.
        highlights:
          - Conducted semi-structured interviews with teachers, parents, and students to assess perceptions of China's ban of after-school tutoring on educational equity in Beijing.
          - Utilized Qualtrics to administer questionnaires in Beijing high schools to examine household education expenditure patterns.

      - company: School of Journalism and Communication, Renmin University of China
        position: "Independent Studies (Supervisor: Prof. Tianping He)"
        location: Beijing, China
        start_date: 2022
        end_date: 2022
        summary: The Interaction between Vtubers (Virtual Idols) and Their Fans.
        highlights:
          - Conducted 26 semi-structured interviews with Vtuber fans to examine three types of fan-idol interactions.
          - Applied grounded theory and discourse analysis to identify how fans, performers, and agencies compete for interpretive control over virtual idol images.

